<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminova Edu</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Tailwind CSS (CDN for zero-build static) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#06b6d4', // Cyan 500
                            hover: '#0891b2',   // Cyan 600
                            dark: '#1e293b',    // Slate 800
                            gold: '#fbbf24',    // Amber 400
                        }
                    },
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- HTM (Hyperscript Tagged Markup) -->
    <!-- Native replacement for Babel/JSX to prevent CORS errors -->
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

    <!-- Data (Loaded natively as window.LUMINOVA_DATA) -->
    <script src="data.js"></script>

</head>

<body class="antialiased min-h-screen">

    <div id="root"></div>

    <!-- Application Logic (Strictly Native Monolith) -->
    <script src="app.js"></script>

</body>

</html>
